<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c14">
<title>רוטינת בוקר</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Secular+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Primary */
  --c-teal: #2BBCB3;
  --c-teal-light: #3dd4cb;
  --c-teal-dark: #1a9e96;
  --c-teal-glow: rgba(43,188,179,0.12);
  --c-teal-electric: #00e5d9;

  /* Accent */
  --c-orange: #F4A261;
  --c-orange-light: #f7b882;
  --c-orange-glow: rgba(244,162,97,0.12);

  /* Backgrounds */
  --c-bg: #0a0c14;
  --c-bg-raised: #12141f;
  --c-bg-card: #181b28;
  --c-bg-input: #1e2233;
  --c-border: rgba(255,255,255,0.06);

  /* Text */
  --c-text: rgba(255,255,255,0.92);
  --c-text-mid: rgba(255,255,255,0.6);
  --c-text-dim: rgba(255,255,255,0.35);

  /* Functional */
  --c-success: #34d399;
  --c-danger: #f87171;

  /* Typography */
  --t-hero: clamp(32px, 7vw, 56px);
  --t-big: clamp(24px, 5vw, 40px);
  --t-section: clamp(20px, 4vw, 28px);
  --t-body: clamp(17px, 1.8vw, 20px);
  --t-small: clamp(14px, 1.4vw, 16px);
  --t-tiny: clamp(12px, 1.2vw, 14px);

  /* Spacing */
  --pad: 20px;
  --radius-s: 10px;
  --radius-m: 16px;
  --radius-l: 24px;
}

html {
  font-family: 'Heebo', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  font-size: var(--t-body);
  line-height: 1.6;
}

body { padding-bottom: 76px; }

/* Grain overlay for depth */
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0.03;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 128px;
  z-index: 9999;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--c-bg-raised);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--c-border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0 8px;
  background: none; border: none; color: var(--c-text-dim);
  font-family: inherit; font-size: var(--t-tiny); cursor: pointer;
  transition: color 0.25s;
  min-height: 48px;
}
.nav-btn:focus-visible { outline: 2px solid var(--c-teal); outline-offset: -2px; }
.nav-btn.active { color: var(--c-teal); }
.nav-btn svg { width: 22px; height: 22px; }

/* ===== SCREENS ===== */
.screen { display: none; padding: var(--pad); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.screen.active { display: block; }

.screen-header {
  font-family: 'Secular One', 'Heebo', sans-serif;
  font-size: var(--t-big);
  margin-bottom: clamp(16px, 4vw, 28px);
  color: var(--c-text);
}

/* ===== TIMER SCREEN ===== */
.timer-screen { padding: 0; text-align: center; }

/* -- Idle State -- */
.idle-view {
  min-height: calc(100vh - 80px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: clamp(30px, 8vw, 60px) var(--pad);
  position: relative;
  overflow: hidden;
}
.idle-view::before {
  content: '';
  position: absolute; top: -40%; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, var(--c-teal-glow) 0%, transparent 70%);
  filter: blur(60px);
  pointer-events: none;
}
.idle-greeting {
  font-size: var(--t-small); color: var(--c-text-dim);
  margin-bottom: 8px; position: relative;
}
.idle-title {
  font-family: 'Secular One', 'Heebo', sans-serif;
  font-size: var(--t-hero);
  line-height: 1.15;
  margin-bottom: 6px;
  position: relative;
}
.idle-title .accent { color: var(--c-teal); }
.idle-stats {
  font-size: var(--t-small); color: var(--c-text-mid);
  margin-bottom: clamp(32px, 8vw, 48px);
  position: relative;
}
.start-btn {
  position: relative;
  background: var(--c-teal);
  color: var(--c-bg);
  border: none;
  border-radius: 100px;
  padding: 18px 56px;
  font-size: clamp(18px, 2vw, 22px);
  font-weight: 700;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(.16,1,.3,1), box-shadow 0.3s;
  box-shadow: 0 0 40px var(--c-teal-glow), 0 8px 32px rgba(0,0,0,0.4);
}
.start-btn:active { transform: scale(0.95); }
.start-btn:focus-visible { outline: 3px solid var(--c-teal-electric); outline-offset: 4px; }

.idle-last-workout {
  margin-top: clamp(24px, 6vw, 40px);
  font-size: var(--t-tiny); color: var(--c-text-dim);
  position: relative;
}

/* -- Active Exercise View -- */

.exercise-display {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: clamp(12px, 3vw, 20px) var(--pad);
  position: relative;
  min-height: calc(100vh - 340px);
}

.ex-progress-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--c-bg-card);
}
.ex-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--c-teal), var(--c-teal-electric));
  transition: width 0.4s ease-out;
  border-radius: 0 2px 2px 0;
}

.ex-counter {
  font-size: var(--t-tiny);
  color: var(--c-text-dim);
  margin-bottom: clamp(12px, 3vw, 20px);
  letter-spacing: 0; /* no letter-spacing for Hebrew */
}

.ex-illustration {
  width: clamp(100px, 25vw, 140px);
  height: clamp(100px, 25vw, 140px);
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c-teal-glow), var(--c-orange-glow));
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(2.5rem, 6vw, 3.5rem);
  margin-bottom: clamp(16px, 4vw, 24px);
  border: 2px solid rgba(255,255,255,0.08);
  position: relative;
}
.ex-illustration svg.ex-svg {
  width: 72%; height: 72%;
  filter: url(#pencil);
}
.ex-illustration.active::after {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--c-teal);
  animation: ring-breathe 2.5s ease-in-out infinite;
}
@keyframes ring-breathe {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 0.2; transform: scale(1.06); }
}

.ex-name {
  font-family: 'Secular One', 'Heebo', sans-serif;
  font-size: var(--t-big);
  line-height: 1.3;
  margin-bottom: clamp(20px, 5vw, 32px);
  max-width: 320px;
}

/* Timer Ring */
.timer-container {
  position: relative;
  width: clamp(140px, 35vw, 180px);
  height: clamp(140px, 35vw, 180px);
  margin-bottom: clamp(20px, 5vw, 32px);
}
.timer-svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.timer-track { stroke: var(--c-bg-card); fill: none; stroke-width: 5; }
.timer-fill {
  fill: none; stroke-width: 5;
  stroke-linecap: round;
  stroke: var(--c-teal);
  transition: stroke 0.4s;
}
.timer-fill.warn { stroke: var(--c-orange); }
.timer-fill.danger { stroke: var(--c-danger); }

.timer-digits {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Heebo', sans-serif;
  font-size: clamp(2.4rem, 7vw, 3.2rem);
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}

/* Next exercise label */
.next-label {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-m);
  padding: 10px 20px;
  font-size: var(--t-small);
  color: var(--c-text-dim);
  max-width: 300px;
  opacity: 0.85;
}
.next-label strong { color: var(--c-text); font-weight: 500; }

/* ===== MUSIC PLAYER (in workout) ===== */
.workout-player {
  width: 100%;
  padding: 0 var(--pad);
  margin-top: 8px;
  margin-bottom: 8px;
}
.workout-player iframe {
  width: 100%; border: none;
  border-radius: var(--radius-m);
  display: block;
}

/* ===== CONTROLS BAR ===== */
.controls-bar {
  position: fixed;
  bottom: 64px; left: 0; right: 0;
  background: linear-gradient(to top, var(--c-bg-raised) 80%, transparent);
  align-items: center; justify-content: center;
  gap: clamp(10px, 3vw, 20px);
  padding: 16px var(--pad) 12px;
  z-index: 99;
  display: none;
}

.ctrl-btn {
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: inherit;
  transition: transform 0.15s cubic-bezier(.16,1,.3,1), background 0.2s;
  min-width: 48px; min-height: 48px;
}
.ctrl-btn:active { transform: scale(0.9); }
.ctrl-btn:focus-visible { outline: 2px solid var(--c-teal); outline-offset: 2px; }
.ctrl-btn svg { width: 24px; height: 24px; }

.btn-secondary {
  width: 48px; height: 48px;
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  color: var(--c-text-mid);
}

.btn-play {
  width: 64px; height: 64px;
  background: var(--c-teal);
  color: var(--c-bg);
  box-shadow: 0 0 30px var(--c-teal-glow);
}
.btn-play svg { width: 28px; height: 28px; }

.btn-done {
  background: var(--c-bg-card);
  border: 1px solid var(--c-teal);
  color: var(--c-teal);
  border-radius: 100px;
  width: auto; padding: 0 20px;
  font-size: var(--t-small); font-weight: 700;
  height: 48px;
}

/* ===== COMPLETE OVERLAY ===== */
.complete-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--c-bg);
  z-index: 200;
  flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: var(--pad);
}
.complete-overlay.show { display: flex; }

.complete-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c-teal-glow), var(--c-success));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem;
  margin-bottom: 20px;
  box-shadow: 0 0 60px rgba(52,211,153,0.15);
}
.complete-overlay h2 {
  font-family: 'Secular One', 'Heebo', sans-serif;
  font-size: var(--t-big);
  margin-bottom: 6px;
}
.complete-overlay .subtitle { color: var(--c-text-mid); margin-bottom: 6px; }
.complete-overlay .stats {
  color: var(--c-teal); font-weight: 500;
  font-size: clamp(16px, 2vw, 20px);
  margin-bottom: clamp(28px, 6vw, 44px);
}
.close-complete-btn {
  background: var(--c-teal); color: var(--c-bg);
  border: none; border-radius: 100px;
  padding: 16px 44px;
  font-size: var(--t-body); font-weight: 700;
  font-family: 'Heebo', sans-serif; cursor: pointer;
  box-shadow: 0 0 40px var(--c-teal-glow);
  transition: transform 0.2s;
}
.close-complete-btn:active { transform: scale(0.95); }

/* ===== EXERCISES SCREEN ===== */
.exercise-list {
  display: flex; flex-direction: column;
  gap: 6px;
}

.ex-item {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-s);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  position: relative;
  transition: opacity 0.2s, border-color 0.2s;
}
.ex-item.dragging { opacity: 0.4; border-color: var(--c-teal); }

.ex-drag {
  color: var(--c-text-dim); cursor: grab;
  display: flex; align-items: center;
  min-width: 20px;
  font-size: 1rem;
  touch-action: none;
}
.ex-num {
  font-size: var(--t-tiny); color: var(--c-text-dim);
  min-width: 22px; text-align: center;
  font-variant-numeric: tabular-nums;
}
.ex-emoji { font-size: 1.3rem; line-height: 1; }
.ex-info { flex: 1; min-width: 0; }
.ex-info-name {
  font-weight: 500; font-size: var(--t-small);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ex-info-dur { font-size: var(--t-tiny); color: var(--c-text-dim); }
.ex-actions { display: flex; gap: 2px; }
.ex-action-btn {
  background: none; border: none; color: var(--c-text-dim);
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.95rem;
  transition: background 0.2s, color 0.2s;
}
.ex-action-btn:focus-visible { outline: 2px solid var(--c-teal); }
.ex-action-btn:hover, .ex-action-btn:active { background: var(--c-bg-input); color: var(--c-text); }
.ex-action-btn.delete:hover, .ex-action-btn.delete:active { color: var(--c-danger); }

.add-exercise-btn {
  background: transparent;
  border: 1.5px dashed rgba(43,188,179,0.35);
  border-radius: var(--radius-s);
  padding: 14px;
  color: var(--c-teal);
  font-family: inherit; font-size: var(--t-small);
  font-weight: 500;
  cursor: pointer; width: 100%; margin-top: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.add-exercise-btn:active { background: var(--c-teal-glow); border-color: var(--c-teal); }

.reset-exercises-btn {
  background: none; border: none;
  color: var(--c-text-dim); font-family: inherit;
  font-size: var(--t-tiny); cursor: pointer;
  margin-top: 12px; padding: 8px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  z-index: 300;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--c-bg-raised);
  border-top: 1px solid var(--c-border);
  border-radius: var(--radius-l) var(--radius-l) 0 0;
  width: 100%; max-width: 500px;
  padding: 28px var(--pad) calc(28px + env(safe-area-inset-bottom, 0));
}
.modal h3 {
  font-family: 'Secular One', 'Heebo', sans-serif;
  font-size: var(--t-section); margin-bottom: 20px;
}
.modal-field { margin-bottom: 16px; }
.modal-field label {
  display: block; font-size: var(--t-tiny);
  color: var(--c-text-mid); margin-bottom: 6px;
}
.modal-field input {
  width: 100%; background: var(--c-bg-input);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-s);
  padding: 14px 16px; color: var(--c-text);
  font-family: inherit; font-size: var(--t-body);
  outline: none; transition: border-color 0.2s;
}
.modal-field input:focus { border-color: var(--c-teal); }
.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.modal-btn {
  flex: 1; padding: 14px; border: none;
  border-radius: var(--radius-s);
  font-family: inherit; font-size: var(--t-body);
  font-weight: 600; cursor: pointer;
  min-height: 48px;
  transition: transform 0.15s;
}
.modal-btn:active { transform: scale(0.97); }
.modal-btn.primary { background: var(--c-teal); color: var(--c-bg); }
.modal-btn.secondary { background: var(--c-bg-card); color: var(--c-text-mid); border: 1px solid var(--c-border); }

/* ===== JOURNAL SCREEN ===== */
.journal-streak {
  background: linear-gradient(135deg, var(--c-bg-card), var(--c-bg-raised));
  border: 1px solid var(--c-border);
  border-radius: var(--radius-m);
  padding: clamp(16px, 4vw, 24px);
  text-align: center;
  margin-bottom: clamp(16px, 4vw, 24px);
  position: relative;
  overflow: hidden;
}
.journal-streak::before {
  content: '';
  position: absolute; top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, var(--c-teal-glow), transparent);
  filter: blur(30px);
  pointer-events: none;
}
.journal-streak .streak-num {
  font-family: 'Secular One', 'Heebo', sans-serif;
  font-size: var(--t-hero); color: var(--c-teal);
  line-height: 1; position: relative;
}
.journal-streak .streak-label {
  font-size: var(--t-small); color: var(--c-text-dim);
  position: relative;
}

.journal-list { display: flex; flex-direction: column; gap: 6px; }

.journal-item {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-s);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.journal-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.journal-icon.done { background: rgba(52,211,153,0.12); }
.journal-icon.partial { background: var(--c-orange-glow); }
.journal-date { flex: 1; }
.journal-date-day { font-weight: 700; font-size: var(--t-small); }
.journal-date-full { font-size: var(--t-tiny); color: var(--c-text-dim); }
.journal-meta { text-align: start; } /* RTL: start = right */
.journal-time { color: var(--c-teal); font-weight: 500; font-size: var(--t-small); }
.journal-count { font-size: var(--t-tiny); color: var(--c-text-dim); }

.journal-empty {
  text-align: center;
  padding: clamp(40px, 10vw, 80px) var(--pad);
  color: var(--c-text-dim);
}
.journal-empty-icon {
  font-size: 3rem; display: block;
  margin-bottom: 12px; opacity: 0.5;
}

/* ===== MUSIC SCREEN ===== */
.music-section { margin-bottom: clamp(16px, 4vw, 24px); }
.music-section h3 {
  font-size: var(--t-section); font-weight: 700;
  margin-bottom: 14px;
}

.spotify-login-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 24px;
  background: #1DB954; color: #fff;
  border: none; border-radius: var(--radius-m);
  font-family: inherit; font-size: var(--t-body); font-weight: 700;
  cursor: pointer; transition: background 0.2s;
}
.spotify-login-btn:hover { background: #1ed760; }
.spotify-login-btn svg { width: 24px; height: 24px; }

.sp-player {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-m);
  padding: 20px;
}

.sp-now-playing {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
}
.sp-album-art {
  width: 72px; height: 72px;
  border-radius: var(--radius-s);
  object-fit: cover;
  background: var(--c-bg-input);
  flex-shrink: 0;
}
.sp-track-info { flex: 1; min-width: 0; }
.sp-track-name {
  font-size: var(--t-body); font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sp-track-artist {
  font-size: var(--t-small); color: var(--c-text-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.sp-progress-wrap {
  margin-bottom: 16px; cursor: pointer;
  padding: 4px 0;
}
.sp-progress-bar {
  height: 4px; background: var(--c-bg-input);
  border-radius: 2px; position: relative; overflow: hidden;
}
.sp-progress-fill {
  height: 100%; background: var(--c-teal);
  border-radius: 2px; width: 0%; transition: width 0.3s linear;
}
.sp-progress-times {
  display: flex; justify-content: space-between;
  font-size: var(--t-tiny); color: var(--c-text-dim);
  margin-top: 4px;
}

.sp-controls {
  display: flex; align-items: center; justify-content: center; gap: 16px;
}
.sp-ctrl-btn {
  background: none; border: none; color: var(--c-text-mid);
  cursor: pointer; padding: 8px; border-radius: 50%;
  transition: color 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.sp-ctrl-btn:hover { color: var(--c-text); background: rgba(255,255,255,0.06); }
.sp-ctrl-btn svg { width: 24px; height: 24px; }
.sp-ctrl-btn.sp-play-btn {
  background: var(--c-teal); color: #fff;
  width: 52px; height: 52px; border-radius: 50%;
}
.sp-ctrl-btn.sp-play-btn:hover { background: var(--c-teal-light); }
.sp-ctrl-btn.sp-play-btn svg { width: 28px; height: 28px; }
.sp-ctrl-btn.active { color: var(--c-teal); }

.sp-volume-wrap {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px;
}
.sp-volume-wrap svg { width: 20px; height: 20px; color: var(--c-text-dim); flex-shrink: 0; }
.sp-volume-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; background: var(--c-bg-input);
  border-radius: 2px; outline: none;
}
.sp-volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--c-teal); border-radius: 50%; cursor: pointer;
}

.sp-playlist-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  margin-top: 16px;
}
.sp-playlist-card {
  background: var(--c-bg-input); border: 1px solid var(--c-border);
  border-radius: var(--radius-s); padding: 14px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  text-align: center;
}
.sp-playlist-card:hover, .sp-playlist-card.active {
  border-color: var(--c-teal); background: var(--c-teal-glow);
}
.sp-playlist-card .sp-pl-emoji { font-size: 1.8rem; margin-bottom: 6px; }
.sp-playlist-card .sp-pl-name {
  font-size: var(--t-small); font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.sp-status {
  text-align: center; padding: 12px;
  font-size: var(--t-small); color: var(--c-text-dim);
}

.music-note {
  background: var(--c-bg-card);
  border: 1px solid var(--c-border);
  border-right: 3px solid var(--c-teal);
  border-radius: var(--radius-s);
  padding: 14px 18px;
  font-size: var(--t-small); color: var(--c-text-mid);
  line-height: 1.7;
  margin-top: 16px;
}

/* ===== REVEAL ANIMATIONS ===== */
.rv {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s cubic-bezier(.16,1,.3,1),
              transform 0.6s cubic-bezier(.16,1,.3,1);
}
.rv.on { opacity: 1; transform: none; }
.rv-d1 { transition-delay: 0.08s; }
.rv-d2 { transition-delay: 0.16s; }
.rv-d3 { transition-delay: 0.24s; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .rv { transition: opacity 0.3s ease; transform: none; }
  .ex-illustration.active::after { animation: none; }
  .start-btn { transition: none; }
}

/* Focus visible */
:focus-visible { outline: 2px solid var(--c-teal); outline-offset: 2px; }
:focus:not(:focus-visible) { outline: none; }
</style>
</head>

function loadLocal(key, fallback) {

  catch { return fallback; }
}
function saveLocal(key, data) { localStorage.setItem(STORAGE_KEY + '_' + key, JSON.stringify(data)); }

async function syncFromCloud() {
  if (!sb) return;
  try {
    // Load exercises
    const { data: exData } = await sb.from('morning_exercises')
      .select('exercises').eq('user_id', 'mosh').order('updated_at', { ascending: false }).limit(1);

// ===== TIMER STATE =====
let currentIdx = 0;
let timeLeft = 30;
let isPlaying = false;
let interval = null;
let startTime = null;

const CIRC = 2 * Math.PI * 70;

// ===== AUDIO =====
let actx = null;
function getACtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function beep(freq = 800, dur = 0.15) {
  try {
    const ctx = getACtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function finishBeep() {
  beep(880, 0.15);
  setTimeout(() => beep(1100, 0.15), 150);
  setTimeout(() => beep(1400, 0.25), 300);
}

// Volume ducking for Spotify during beeps/speech
let spSavedVolume = 0.7;
let duckTimeout = null;

function duckSpotify() {
  if (!spPlayer) return;
  spPlayer.getVolume().then(vol => {
    if (vol > 0.15) spSavedVolume = vol;
    spPlayer.setVolume(0.1);
  });
  clearTimeout(duckTimeout);
}

function unduckSpotify(delay = 1500) {
  clearTimeout(duckTimeout);
  duckTimeout = setTimeout(() => {
    if (spPlayer) spPlayer.setVolume(spSavedVolume);
  }, delay);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  duckSpotify();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'he-IL'; u.rate = 0.95;
  const voices = speechSynthesis.getVoices();
  const hv = voices.find(v => v.lang.startsWith('he'));
  if (hv) u.voice = hv;
  u.onend = () => unduckSpotify(500);
  u.onerror = () => unduckSpotify(500);
  speechSynthesis.speak(u);
}
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ===== GREETING =====
function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'לילה טוב, מוש';
  if (h < 12) return 'בוקר טוב, מוש';
  if (h < 17) return 'צהריים טובים, מוש';
  if (h < 21) return 'ערב טוב, מוש';
  return 'לילה טוב, מוש';
}

// ===== TIMER DISPLAY =====
function updateDisplay() {
  const ex = exercises[currentIdx];
  const total = ex.duration;

  document.getElementById('exName').textContent = ex.name;
  const illEl = document.getElementById('exIllustration');
  if (ex.svg && EX_SVG[ex.svg]) illEl.innerHTML = EX_SVG[ex.svg];
  else illEl.textContent = ex.emoji || '🏋️';
  document.getElementById('exCounter').textContent = `${currentIdx + 1} / ${exercises.length}`;
  document.getElementById('timerText').textContent = timeLeft;

  // Progress bar
  const pct = ((currentIdx + (1 - timeLeft / total)) / exercises.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // Ring
  const progress = timeLeft / total;
  const offset = CIRC * (1 - progress);
  const ring = document.getElementById('timerRing');
  ring.style.strokeDasharray = CIRC;
  ring.style.strokeDashoffset = offset;
  ring.classList.remove('warn', 'danger');
  if (timeLeft <= 3) ring.classList.add('danger');
  else if (timeLeft <= 5) ring.classList.add('warn');

  // Illustration
  const ill = document.getElementById('exIllustration');
  ill.classList.toggle('active', isPlaying);

  // Next
  const nl = document.getElementById('nextLabel');
  if (currentIdx < exercises.length - 1) {
    nl.style.display = '';
    nl.innerHTML = `הבא: <strong>${exercises[currentIdx + 1].name}</strong>`;
  } else {
    nl.innerHTML = '<strong>תרגיל אחרון!</strong>';
  }
}

function tick() {
  if (timeLeft <= 0) {
    if (currentIdx < exercises.length - 1) {
      currentIdx++;
      timeLeft = exercises[currentIdx].duration;
      speak(exercises[currentIdx].name);
    } else {
      pause();
      finishRoutine();
      return;
    }
  } else {
    timeLeft--;
    if (timeLeft <= 3 && timeLeft > 0) { duckSpotify(); beep(600, 0.1); }
    if (timeLeft === 0 && currentIdx < exercises.length - 1) beep(1000, 0.2);
  }
  updateDisplay();
}

function play() {
  if (interval) return;
  isPlaying = true;
  document.getElementById('iconPlay').style.display = 'none';
  document.getElementById('iconPause').style.display = '';
  interval = setInterval(tick, 1000);
  updateDisplay();
}

function pause() {
  isPlaying = false;
  document.getElementById('iconPlay').style.display = '';
  document.getElementById('iconPause').style.display = 'none';
  if (interval) { clearInterval(interval); interval = null; }
  updateDisplay();
}

function togglePlay() { isPlaying ? pause() : play(); }

function startRoutine() {
  routineActive = true;
  currentIdx = 0;
  timeLeft = exercises[currentIdx].duration;
  startTime = new Date();

  document.getElementById('idleView').style.display = 'none';
  document.getElementById('activeView').style.display = 'block';
  document.getElementById('controlsBar').style.display = 'flex';

  updateDisplay();
  speak(exercises[0].name);
  play();
}

function resetRoutine() {
  pause();
  currentIdx = 0;
  timeLeft = exercises[0].duration;
  updateDisplay();
}

function nextExercise() {
  if (currentIdx < exercises.length - 1) {
    currentIdx++;
    timeLeft = exercises[currentIdx].duration;
    speak(exercises[currentIdx].name);
    updateDisplay();
  }
}

function prevExercise() {
  if (currentIdx > 0) {
    currentIdx--;
    timeLeft = exercises[currentIdx].duration;
    speak(exercises[currentIdx].name);
    updateDisplay();
  }
}

function finishRoutine() {
  pause();
  routineActive = false;
  finishBeep();

  const now = new Date();
  const entry = {
    date: now.toISOString(),
    time: now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }),
    count: currentIdx + 1,
    total: exercises.length,
    done: currentIdx >= exercises.length - 1
  };
  journal.unshift(entry);
  saveJournalEntry(entry);

  const elapsed = startTime ? Math.round((now - startTime) / 1000) : 0;
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('completeStats').textContent =
    `${entry.count} תרגילים | ${m}:${String(s).padStart(2,'0')} דקות`;
  document.getElementById('completeOverlay').classList.add('show');
}

function closeComplete() {
  document.getElementById('completeOverlay').classList.remove('show');
  document.getElementById('idleView').style.display = '';
  document.getElementById('activeView').style.display = 'none';
  document.getElementById('controlsBar').style.display = 'none';
  updateIdle();
}

function updateIdle() {
  const totalSecs = exercises.reduce((a, e) => a + e.duration, 0);
  const mins = Math.round(totalSecs / 60);
  const el = document.getElementById('idleStats');
  if (el) el.textContent = `${exercises.length} תרגילים \u2022 ~${mins} דקות`;

  // Last workout
  const lw = document.getElementById('idleLastWorkout');
  if (journal.length > 0) {
    const last = new Date(journal[0].date);
    const today = new Date();
    const diff = Math.floor((today - last) / 86400000);
    if (diff === 0) lw.textContent = 'התאמנת היום. יופי.';
    else if (diff === 1) lw.textContent = 'אתמול התאמנת. בוא נמשיך.';
    else lw.textContent = `לפני ${diff} ימים. הגוף מחכה.`;
  } else {
    lw.textContent = '';
  }

  document.getElementById('idleGreeting').textContent = getGreeting();
}

// ===== NAVIGATION =====
function switchScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const showWorkout = name === 'Timer' && routineActive;
  document.getElementById('controlsBar').style.display = showWorkout ? 'flex' : 'none';

  if (name === 'Exercises') renderExerciseList();
  if (name === 'Journal') renderJournal();
}

// ===== EXERCISE LIST =====
function renderExerciseList() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  exercises.forEach((ex, i) => {
    const el = document.createElement('div');
    el.className = 'ex-item';
    el.draggable = true;
    el.dataset.index = i;
    el.innerHTML = `
      <div class="ex-drag">⠿</div>
      <div class="ex-num">${i + 1}</div>
      <div class="ex-emoji">${ex.svg && EX_SVG[ex.svg] ? '<span style="display:inline-flex;width:28px;height:28px">' + EX_SVG[ex.svg] + '</span>' : (ex.emoji || '🏋️')}</div>
      <div class="ex-info">
        <div class="ex-info-name">${ex.name}</div>
        <div class="ex-info-dur">${ex.duration} שניות</div>
      </div>
      <div class="ex-actions">
        <button class="ex-action-btn" onclick="openEditModal(${i})" aria-label="עריכה">✏️</button>
        <button class="ex-action-btn delete" onclick="deleteExercise(${i})" aria-label="מחיקה">🗑️</button>
      </div>
    `;
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragover', onDragOver);
    el.addEventListener('drop', onDrop);
    el.addEventListener('dragend', onDragEnd);
    el.addEventListener('touchstart', onTouchStart, { passive: false });
    el.addEventListener('touchmove', onTouchMove, { passive: false });
    el.addEventListener('touchend', onTouchEnd);
    list.appendChild(el);
  });
}

let dragIdx = null;
function onDragStart(e) { dragIdx = +this.dataset.index; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e) { e.preventDefault(); }
function onDrop(e) {
  e.preventDefault();
  const to = +this.dataset.index;
  if (dragIdx !== null && dragIdx !== to) {
    const [m] = exercises.splice(dragIdx, 1);
    exercises.splice(to, 0, m);
    saveExercisesToCloud();
    renderExerciseList();
  }
}
function onDragEnd() { this.classList.remove('dragging'); dragIdx = null; }

let tItem = null, tIdx = null;
function onTouchStart(e) {
  if (!e.target.closest('.ex-drag')) return;
  e.preventDefault();
  tItem = this; tIdx = +this.dataset.index;
  this.classList.add('dragging');
}
function onTouchMove(e) {
  if (!tItem) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const over = [...document.querySelectorAll('.ex-item')].find(el => {
    const r = el.getBoundingClientRect();
    return y >= r.top && y <= r.bottom;
  });
  if (over && over !== tItem) {
    const oi = +over.dataset.index;
    const [m] = exercises.splice(tIdx, 1);
    exercises.splice(oi, 0, m);
    tIdx = oi;
    saveExercisesToCloud();
    renderExerciseList();
    tItem = document.querySelector(`.ex-item[data-index="${oi}"]`);
    if (tItem) tItem.classList.add('dragging');
  }
}
function onTouchEnd() { if (tItem) tItem.classList.remove('dragging'); tItem = null; tIdx = null; }

function renderJournal() {
  const list = document.getElementById('journalList');
  const streakEl = document.getElementById('journalStreak');

  if (journal.length === 0) {
    streakEl.innerHTML = '';
    list.innerHTML = `<div class="journal-empty"><span class="journal-empty-icon">📅</span>עדיין אין רשומות.<br>תתחיל ותראה את זה מתמלא.</div>`;
    return;
  }

  const streak = calcStreak();
  streakEl.innerHTML = `<div class="streak-num">${streak}</div><div class="streak-label">ימים ברצף</div>`;

  const dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  list.innerHTML = '';
  journal.forEach(entry => {
    const d = new Date(entry.date);
    const el = document.createElement('div');
    el.className = 'journal-item';
    el.innerHTML = `
      <div class="journal-icon ${entry.done ? 'done' : 'partial'}">${entry.done ? '✅' : '⏸️'}</div>
      <div class="journal-date">
        <div class="journal-date-day">יום ${dayNames[d.getDay()]}</div>
        <div class="journal-date-full">${d.toLocaleDateString('he-IL', { day:'numeric', month:'long', year:'numeric' })}</div>
      </div>
      <div class="journal-meta">
        <div class="journal-time">${entry.time}</div>
        <div class="journal-count">${entry.count}/${entry.total}</div>
      </div>
    `;
    list.appendChild(el);
  });
}

function calcStreak() {
  if (!journal.length) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = d.toDateString();
    if (journal.some(e => new Date(e.date).toDateString() === ds)) streak++;
    else if (i > 0) break;
  }
  return streak;
}

const SP_CLIENT_ID = '4b448c71c0034789a61dbe7f6e072c02';
const SP_REDIRECT = window.location.origin + window.location.pathname;
const SP_SCOPES = 'streaming user-read-playback-state user-modify-playback-state user-read-currently-playing playlist-read-private playlist-read-collaborative playlist-modify-public playlist-modify-private';

// PKCE helpers
function generateRandomString(length) {
  const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const values = crypto.getRandomValues(new Uint8Array(length));
  return values.reduce((acc, x) => acc + possible[x % possible.length], '');
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return window.crypto.subtle.digest('SHA-256', data);
}

function base64urlencode(buf) {
  let str = '';
  const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.byteLength; i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function spotifyLogin() {
  const codeVerifier = generateRandomString(64);
  localStorage.setItem('sp_code_verifier', codeVerifier);
  const hashed = await sha256(codeVerifier);
  const codeChallenge = base64urlencode(hashed);

  const params = new URLSearchParams({
    client_id: SP_CLIENT_ID,
    response_type: 'code',
    redirect_uri: SP_REDIRECT,
    scope: SP_SCOPES,
    code_challenge_method: 'S256',
    code_challenge: codeChallenge,
    show_dialog: 'false'
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeCodeForToken(code) {
  const codeVerifier = localStorage.getItem('sp_code_verifier');
  if (!codeVerifier) return null;

  const resp = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: SP_CLIENT_ID,
      grant_type: 'authorization_code',
      code: code,
      redirect_uri: SP_REDIRECT,
      code_verifier: codeVerifier
    })
  });

  if (!resp.ok) return null;
  const data = await resp.json();
  localStorage.setItem('sp_token', data.access_token);
  localStorage.setItem('sp_token_expires', Date.now() + (data.expires_in * 1000));
  if (data.refresh_token) localStorage.setItem('sp_refresh_token', data.refresh_token);
  localStorage.removeItem('sp_code_verifier');
  return data.access_token;
}

async function refreshSpotifyToken() {
  const refreshToken = localStorage.getItem('sp_refresh_token');
  if (!refreshToken) return null;

  const resp = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: SP_CLIENT_ID,
      grant_type: 'refresh_token',
      refresh_token: refreshToken
    })
  });

  if (!resp.ok) return null;
  const data = await resp.json();
  localStorage.setItem('sp_token', data.access_token);
  localStorage.setItem('sp_token_expires', Date.now() + (data.expires_in * 1000));
  if (data.refresh_token) localStorage.setItem('sp_refresh_token', data.refresh_token);
  return data.access_token;
}

async function getToken() {
  // Check for auth code in URL
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) {
    window.history.replaceState(null, '', window.location.pathname);
    const token = await exchangeCodeForToken(code);
    if (token) return token;
  }

  // Check saved token
  const saved = localStorage.getItem('sp_token');
  const exp = localStorage.getItem('sp_token_expires');
  if (saved && exp && Date.now() < parseInt(exp)) return saved;

  // Try refresh
  return await refreshSpotifyToken();
}

function initSpotifySDK(token) {
  spToken = token;
  const script = document.createElement('script');
  script.src = 'https://sdk.scdn.co/spotify-player.js';
  document.body.appendChild(script);

  window.onSpotifyWebPlaybackSDKReady = () => {
    spPlayer = new Spotify.Player({
      name: 'רוטינת בוקר',
      getOAuthToken: cb => cb(spToken),
      volume: 0.7
    });

    spPlayer.addListener('ready', ({ device_id }) => {
      spDeviceId = device_id;
      transferPlayback(device_id);
      showPlayerUI();
      renderPlaylists();
    });

    spPlayer.addListener('not_ready', () => {
      console.log('Spotify device offline');
    });

    spPlayer.addListener('player_state_changed', state => {
      if (!state) return;
      updatePlayerState(state);
    });

    spPlayer.addListener('initialization_error', ({ message }) => console.error('Init error:', message));
    spPlayer.addListener('authentication_error', ({ message }) => {
      console.error('Auth error:', message);
      localStorage.removeItem('sp_token');
      localStorage.removeItem('sp_token_expires');
      showLoginUI();
    });
    spPlayer.addListener('account_error', ({ message }) => console.error('Account error:', message));

    spPlayer.connect();
  };
}

function transferPlayback(deviceId) {
  fetch('https://api.spotify.com/v1/me/player', {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + spToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ device_ids: [deviceId], play: false })
  });
}

function showLoginUI() {
  document.getElementById('spLoginView').style.display = '';
  document.getElementById('spPlayerView').style.display = 'none';
  document.getElementById('workoutMiniPlayer').style.display = 'none';
}

function showPlayerUI() {
  document.getElementById('spLoginView').style.display = 'none';
  document.getElementById('spPlayerView').style.display = '';
}

function updatePlayerState(state) {
  const track = state.track_window.current_track;
  spIsPlaying = !state.paused;
  spCurrentPosition = state.position;
  spCurrentDuration = state.duration;

  // Main player
  document.getElementById('spTrackName').textContent = track.name;
  document.getElementById('spTrackArtist').textContent = track.artists.map(a => a.name).join(', ');
  const art = track.album.images[0]?.url || '';
  document.getElementById('spAlbumArt').src = art;

  // Mini player in workout
  document.getElementById('miniTrackName').textContent = track.name;
  document.getElementById('miniTrackArtist').textContent = track.artists.map(a => a.name).join(', ');
  document.getElementById('miniAlbumArt').src = art;
  document.getElementById('workoutMiniPlayer').style.display = '';

  // Play/pause icons
  updatePlayIcons(spIsPlaying);

  // Shuffle & repeat
  spShuffle = state.shuffle;
  document.getElementById('spShuffleBtn').classList.toggle('active', spShuffle);
  spRepeatMode = state.repeat_mode;
  document.getElementById('spRepeatBtn').classList.toggle('active', spRepeatMode > 0);

  // Progress
  updateProgress();
  clearInterval(spProgressInterval);
  if (spIsPlaying) {
    spProgressInterval = setInterval(() => {
      spCurrentPosition += 300;
      updateProgress();
    }, 300);
  }
}

function updatePlayIcons(playing) {
  document.getElementById('spIconPlay').style.display = playing ? 'none' : '';
  document.getElementById('spIconPause').style.display = playing ? '' : 'none';
  document.getElementById('miniIconPlay').style.display = playing ? 'none' : '';
  document.getElementById('miniIconPause').style.display = playing ? '' : 'none';
}

function updateProgress() {
  if (spCurrentDuration <= 0) return;
  const pct = Math.min(100, (spCurrentPosition / spCurrentDuration) * 100);
  document.getElementById('spProgressFill').style.width = pct + '%';
  document.getElementById('spTimeNow').textContent = msToTime(spCurrentPosition);
  document.getElementById('spTimeTotal').textContent = msToTime(spCurrentDuration);
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// Progress seek
document.getElementById('spProgressWrap')?.addEventListener('click', e => {
  if (!spCurrentDuration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const pos = Math.floor(pct * spCurrentDuration);
  spPlayer?.seek(pos);
});

function spotifyToggle() { spPlayer?.togglePlay(); }
function spotifyNext() { spPlayer?.nextTrack(); }
function spotifyPrev() { spPlayer?.previousTrack(); }

function spotifyVolume(val) {
  spPlayer?.setVolume(val / 100);
}

function spotifyShuffle() {
  spShuffle = !spShuffle;
  fetch(`https://api.spotify.com/v1/me/player/shuffle?state=${spShuffle}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + spToken }
  });
  document.getElementById('spShuffleBtn').classList.toggle('active', spShuffle);
}

function spotifyRepeat() {
  spRepeatMode = (spRepeatMode + 1) % 3;
  const modes = ['off', 'context', 'track'];
  fetch(`https://api.spotify.com/v1/me/player/repeat?state=${modes[spRepeatMode]}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + spToken }
  });
  document.getElementById('spRepeatBtn').classList.toggle('active', spRepeatMode > 0);
}

function playPlaylist(uri) {
  if (!spDeviceId) return;
  fetch(`https://api.spotify.com/v1/me/player/play?device_id=${spDeviceId}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + spToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ context_uri: uri })
  });
  // Highlight active
  document.querySelectorAll('.sp-playlist-card').forEach(c => {
    c.classList.toggle('active', c.dataset.uri === uri);
  });
}

function renderPlaylists() {

async function createMorningPlaylist() {
  if (!spToken) return;
  const statusEl = document.getElementById('createPlaylistStatus');
  statusEl.textContent = 'יוצר פלייליסט...';

  try {
    // Get user ID
    const userResp = await fetch('https://api.spotify.com/v1/me', {
      headers: { 'Authorization': 'Bearer ' + spToken }
    });
    const user = await userResp.json();

    // Create playlist
    const createResp = await fetch(`https://api.spotify.com/v1/users/${user.id}/playlists`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + spToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: 'Morning Routine - Chill R&B',
        description: 'R&B כייפי לאימון בוקר',
        public: false
      })
    });
    const playlist = await createResp.json();

    // Add tracks
    await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/tracks`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + spToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uris: MORNING_RNB_TRACKS })
    });

    // Add to local playlists and play
    const newPl = { name: 'Morning R&B (שלי)', uri: `spotify:playlist:${playlist.id}`, emoji: '🌅' };
    WORKOUT_PLAYLISTS.unshift(newPl);
    renderPlaylists();
    playPlaylist(newPl.uri);

    statusEl.textContent = 'הפלייליסט נוצר ומנגן!';
    document.getElementById('createPlaylistBtn').style.display = 'none';
    setTimeout(() => statusEl.textContent = '', 3000);
  } catch (e) {
    statusEl.textContent = 'שגיאה ביצירה, נסה שוב';
    console.error(e);
  }
}
